name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build-and-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm --workspace frontend run build

      - name: Smoke test backend import
        run: node --input-type=module -e "import('./backend/src/server.js').then(() => process.exit(0)).catch((err) => { console.error(err); process.exit(1); })"
